name: Build and Deploy React + .NET

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Install .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Build API
      - name: Restore API
        run: dotnet restore ./server

      - name: Build API
        run: dotnet publish ./server -c Release -o ./publish

      # Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build React
      - name: Install dependencies
        run: |
          cd client
          npm install

      - name: Build React
        run: |
          cd client
          npm run build
